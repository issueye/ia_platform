name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit Tests
        run: go test ./...

  perf-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Focused Benchmarks
        run: |
          go test ./pkg/lang ./pkg/lang/compiler -run '^$' -bench 'BenchmarkVM(FunctionCall|RecursiveFunction|ArrayPush|ClassMethodCall|ClosureExecution)$|BenchmarkCompiler(SmallAST|MediumAST)$' -benchmem -benchtime=200ms > bench.out
          cat bench.out

      - name: Check Performance Thresholds
        run: go run ./scripts/bench_guard.go bench.out
